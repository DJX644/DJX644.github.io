<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJX644 · 个人主页</title>
<style>
  /* ============================================
     可以在这里修改基本信息：
     - 姓名/昵称: 搜索 "YuYe" 替换成你想要的名字
     - 中文简介: 搜索 "我是雨夜" 替换
     - 英文简介: 搜索 "Nice to meet you" 替换
     - 社交链接: 往下滚动找到 "社交链接区域" 注释
  ============================================ */

  :root {
    --bg-1: #0f0c29;
    --bg-2: #302b63;
    --bg-3: #24243e;
    --accent-1: #ff6ec4;
    --accent-2: #7873f5;
    --accent-3: #4adede;
    --text-primary: #f5f5f7;
    --text-secondary: #b8b5d1;
    --card-bg: rgba(255, 255, 255, 0.06);
    --card-border: rgba(255, 255, 255, 0.12);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2) 50%, var(--bg-3));
    background-attachment: fixed;
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
    position: relative;
    cursor: default;
  }

  /* 背景装饰光斑 */
  body::before,
  body::after {
    content: "";
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.35;
    z-index: 0;
    pointer-events: none;
  }

  body::before {
    width: 420px;
    height: 420px;
    background: var(--accent-1);
    top: -100px;
    left: -100px;
    animation: float1 14s ease-in-out infinite;
  }

  body::after {
    width: 380px;
    height: 380px;
    background: var(--accent-3);
    bottom: -100px;
    right: -100px;
    animation: float2 16s ease-in-out infinite;
  }

  @keyframes float1 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(60px, 40px); }
  }

  @keyframes float2 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-50px, -30px); }
  }

  /* ============== 鼠标跟随光晕 ============== */
  .cursor-glow {
    position: fixed;
    width: 360px;
    height: 360px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(120, 115, 245, 0.18), transparent 70%);
    pointer-events: none;
    z-index: 0;
    transform: translate(-50%, -50%);
    will-change: transform;
    transition: opacity 0.3s ease;
    opacity: 0;
  }

  .cursor-glow.active {
    opacity: 1;
  }

  /* ============== 语言切换按钮 ============== */
  .lang-switch {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10;
    display: flex;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--card-border);
    border-radius: 999px;
    padding: 4px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    animation: fadeIn 0.6s ease 0.3s both;
  }

  .lang-btn {
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.25s ease, color 0.25s ease;
    font-family: inherit;
  }

  .lang-btn.active {
    background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
    color: #fff;
  }

  .lang-btn:not(.active):hover {
    color: var(--text-primary);
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 28px;
    padding: 48px 36px 40px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    text-align: center;
    animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    transform-style: preserve-3d;
    transition: transform 0.15s ease-out, box-shadow 0.3s ease;
    will-change: transform;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .avatar {
    width: 104px;
    height: 104px;
    border-radius: 50%;
    margin: 0 auto 24px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    font-weight: 700;
    color: #fff;
    box-shadow: 0 8px 30px rgba(120, 115, 245, 0.45);
    animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
  }

  /* 头像备用：如果想换成真实照片，把上面 .avatar div 换成
     <img src="你的照片.jpg" class="avatar" style="object-fit:cover;"> */

  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
    animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
  }

  .tagline {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 20px;
    letter-spacing: 0.3px;
    animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
  }

  .bio {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-secondary);
    margin-bottom: 32px;
    min-height: 51px;
    transition: opacity 0.2s ease;
  }

  .bio .typed-cursor {
    display: inline-block;
    width: 2px;
    height: 14px;
    background: var(--accent-3);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ============== 社交链接区域 ============== */
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 20px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--card-border);
    color: var(--text-primary);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
    animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) var(--delay) both;
  }

  .link-btn:nth-child(1) { --delay: 0.5s; }
  .link-btn:nth-child(2) { --delay: 0.6s; }
  .link-btn:nth-child(3) { --delay: 0.7s; }

  .link-btn:hover {
    transform: translateY(-2px);
    background: rgba(255, 255, 255, 0.1);
    border-color: var(--accent-2);
  }

  .link-btn .icon {
    font-size: 17px;
  }

  .link-text {
    transition: opacity 0.15s ease;
  }

  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.5);
    transform: scale(0);
    animation: ripple-effect 0.6s ease-out;
    pointer-events: none;
  }

  @keyframes ripple-effect {
    to { transform: scale(3); opacity: 0; }
  }

  .footer-note {
    margin-top: 32px;
    font-size: 12px;
    color: rgba(184, 181, 209, 0.5);
    animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.8s both;
  }

  @media (prefers-reduced-motion: reduce) {
    body::before, body::after, .card, .avatar, h1, .tagline, .link-btn, .footer-note, .lang-switch {
      animation: none !important;
    }
    .cursor-glow { display: none !important; }
    .card { transform: none !important; transition: none !important; }
  }

  @media (hover: none) {
    .cursor-glow { display: none !important; }
  }

  @media (max-width: 480px) {
    .card { padding: 40px 24px 32px; border-radius: 22px; }
    .lang-switch { top: 14px; right: 14px; }
  }

  /* ============== 开屏加载动画 ============== */
  .preloader {
    position: fixed;
    inset: 0;
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2) 50%, var(--bg-3));
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }

  .preloader.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .preloader-mark {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    box-shadow: 0 8px 30px rgba(120, 115, 245, 0.45);
    animation: preloaderPulse 1.1s ease-in-out infinite;
  }

  @keyframes preloaderPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(0.85); opacity: 0.7; }
  }

  /* 页面主内容在预加载阶段先隐藏，避免和开屏动画的入场动画叠加播放 */
  body.is-loading .card,
  body.is-loading .lang-switch {
    animation-play-state: paused !important;
    opacity: 0;
  }

  @media (prefers-reduced-motion: reduce) {
    .preloader { transition: none; }
    .preloader-mark { animation: none; }
    body.is-loading .card,
    body.is-loading .lang-switch {
      opacity: 1;
    }
  }
</style>
</head>
<body class="is-loading">

  <!-- 开屏加载动画，1秒左右后自动淡出 -->
  <div class="preloader" id="preloader">
    <div class="preloader-mark">Y</div>
  </div>

  <!-- 鼠标跟随光晕 -->
  <div class="cursor-glow" id="cursorGlow"></div>

  <!-- 语言切换按钮 -->
  <div class="lang-switch">
    <button class="lang-btn" id="btnZh" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" id="btnEn" onclick="setLang('en')">EN</button>
  </div>

  <div class="card" id="card">
    <!-- 头像：默认显示名字首字母，想换照片见上方注释 -->
    <div class="avatar">Y</div>

    <!-- 在这里修改你的名字（一般姓名两种语言都一样，不用翻译） -->
    <h1>YuYe</h1>
    <div class="tagline">@DJX644</div>

    <!-- 简介：中英文分别写在 data-zh 和 data-en 里 -->
    <p class="bio" id="bioText"
       data-zh="我是雨夜，很高兴认识你。"
       data-en="I'm YuYe. Nice to meet you."></p>

    <!-- 在这里修改你的社交链接，href 改成真实网址；按钮文字也分中英文 -->
    <div class="links">
      <a class="link-btn" href="https://github.com/DJX644" target="_blank">
        <span class="icon">💻</span>
        <span class="link-text" data-zh="GitHub" data-en="GitHub">GitHub</span>
      </a>
      <a class="link-btn" href="mailto:2178048994@qq.com">
        <span class="icon">📧</span>
        <span class="link-text" data-zh="邮箱联系 2178048994@qq.com" data-en="Email: 2178048994@qq.com">邮箱联系 2178048994@qq.com</span>
      </a>
      <a class="link-btn" href="https://space.bilibili.com/3537107928746180" target="_blank">
        <span class="icon">📺</span>
        <span class="link-text" data-zh="Bilibili" data-en="Bilibili">Bilibili</span>
      </a>
    </div>

    <div class="footer-note">© 2026 YuYe</div>
  </div>

  <script>
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const isTouchDevice = window.matchMedia('(hover: none)').matches;
    const enableEffects = !prefersReducedMotion && !isTouchDevice;

    // ============== 鼠标跟随光晕 ==============
    if (enableEffects) {
      const glow = document.getElementById('cursorGlow');
      let rafId = null;
      let targetX = window.innerWidth / 2;
      let targetY = window.innerHeight / 2;
      let currentX = targetX;
      let currentY = targetY;

      document.addEventListener('mousemove', (e) => {
        targetX = e.clientX;
        targetY = e.clientY;
        glow.classList.add('active');
        if (!rafId) animateGlow();
      }, { passive: true });

      document.addEventListener('mouseleave', () => {
        glow.classList.remove('active');
      });

      function animateGlow() {
        currentX += (targetX - currentX) * 0.12;
        currentY += (targetY - currentY) * 0.12;
        glow.style.transform = `translate(${currentX}px, ${currentY}px) translate(-50%, -50%)`;

        if (Math.abs(targetX - currentX) > 0.5 || Math.abs(targetY - currentY) > 0.5) {
          rafId = requestAnimationFrame(animateGlow);
        } else {
          rafId = null;
        }
      }
    }

    // ============== 卡片轻微 3D 倾斜跟随 ==============
    if (enableEffects) {
      const card = document.getElementById('card');

      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const rotateX = ((y - centerY) / centerY) * -2.5;
        const rotateY = ((x - centerX) / centerX) * 2.5;

        card.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      }, { passive: true });

      card.addEventListener('mouseleave', () => {
        card.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg)';
      });
    }

    // ============== 打字机效果 ==============
    let typingTimeoutId = null;

    function typeWriter(text) {
      const el = document.getElementById('bioText');
      el.textContent = '';
      let i = 0;

      const cursor = document.createElement('span');
      cursor.className = 'typed-cursor';

      function type() {
        if (i < text.length) {
          el.textContent = text.slice(0, i + 1);
          el.appendChild(cursor);
          i++;
          typingTimeoutId = setTimeout(type, 55);
        } else {
          typingTimeoutId = setTimeout(() => cursor.remove(), 2400);
        }
      }
      type();
    }

    // ============== 按钮点击波纹效果 ==============
    document.querySelectorAll('.link-btn').forEach(btn => {
      btn.addEventListener('click', function (e) {
        const rect = this.getBoundingClientRect();
        const ripple = document.createElement('span');
        const size = Math.max(rect.width, rect.height);

        ripple.className = 'ripple';
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
        ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';

        this.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove());
      });
    });

    // ============== 语言切换核心逻辑 ==============
    const STORAGE_KEY = 'site-lang'; // localStorage 中保存语言偏好的键名

    function setLang(lang) {
      // 清掉正在进行的打字动画，避免切换语言时新旧文字打字过程冲突
      if (typingTimeoutId) clearTimeout(typingTimeoutId);

      // 更新所有带 data-zh / data-en 的元素文字
      document.querySelectorAll('[data-' + lang + ']').forEach(el => {
        if (el.id === 'bioText') return; // 简介单独用打字机效果处理，这里跳过
        el.textContent = el.getAttribute('data-' + lang);
      });

      // 简介用打字机效果重新播放（如果用户要求减少动效，则直接显示完整文字）
      const bioEl = document.getElementById('bioText');
      const bioText = bioEl.getAttribute('data-' + lang);
      if (prefersReducedMotion) {
        bioEl.textContent = bioText;
      } else {
        typeWriter(bioText);
      }

      // 更新切换按钮的高亮状态
      document.getElementById('btnZh').classList.toggle('active', lang === 'zh');
      document.getElementById('btnEn').classList.toggle('active', lang === 'en');

      // 更新 html 标签的 lang 属性（有利于屏幕阅读器和浏览器正确识别页面语言）
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';

      // 保存到 localStorage，下次访问自动恢复
      try {
        localStorage.setItem(STORAGE_KEY, lang);
      } catch (e) {
        // 部分隐私模式下 localStorage 可能不可用，静默忽略，不影响当前这次的语言切换
      }
    }

    // ============== 初始化：读取上次保存的语言，没有则默认中文 ==============
    let initialLang = 'zh';
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved === 'zh' || saved === 'en') {
        initialLang = saved;
      }
    } catch (e) {
      // localStorage 不可用时，保持默认中文
    }

    setLang(initialLang);

    // ============== 开屏动画控制 ==============
    // 固定展示约 900ms 后淡出，给访客一个简短的过场，又不会等太久
    const PRELOADER_MIN_TIME = prefersReducedMotion ? 0 : 900;

    function hidePreloader() {
      const preloader = document.getElementById('preloader');
      preloader.classList.add('hidden');
      document.body.classList.remove('is-loading');

      // 动画淡出完成后彻底移除节点，避免常驻一个不可见的 fixed 全屏元素
      preloader.addEventListener('transitionend', () => preloader.remove(), { once: true });
    }

    setTimeout(hidePreloader, PRELOADER_MIN_TIME);
  </script>

</body>
</html>
