<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJX644 · 个人主页</title>
<style>
  /* ============================================
     可以在这里修改基本信息：
     - 姓名/昵称: 搜索 "YuYe" 替换成你想要的名字
     - 简介文字: 搜索 "我是雨夜" 替换
     - 社交链接: 往下滚动找到 "社交链接区域" 注释
  ============================================ */

  :root {
    --bg-1: #0f0c29;
    --bg-2: #302b63;
    --bg-3: #24243e;
    --accent-1: #ff6ec4;
    --accent-2: #7873f5;
    --accent-3: #4adede;
    --text-primary: #f5f5f7;
    --text-secondary: #b8b5d1;
    --card-bg: rgba(255, 255, 255, 0.06);
    --card-border: rgba(255, 255, 255, 0.12);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, var(--bg-1), var(--bg-2) 50%, var(--bg-3));
    background-attachment: fixed;
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
    position: relative;
    cursor: default;
  }

  /* 背景装饰光斑（原有的两个大光斑，缓慢漂浮） */
  body::before,
  body::after {
    content: "";
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.35;
    z-index: 0;
    pointer-events: none;
  }

  body::before {
    width: 420px;
    height: 420px;
    background: var(--accent-1);
    top: -100px;
    left: -100px;
    animation: float1 14s ease-in-out infinite;
  }

  body::after {
    width: 380px;
    height: 380px;
    background: var(--accent-3);
    bottom: -100px;
    right: -100px;
    animation: float2 16s ease-in-out infinite;
  }

  @keyframes float1 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(60px, 40px); }
  }

  @keyframes float2 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-50px, -30px); }
  }

  /* ============== 鼠标跟随光晕（纯 CSS transform，GPU加速，性能开销极小） ============== */
  .cursor-glow {
    position: fixed;
    width: 360px;
    height: 360px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(120, 115, 245, 0.18), transparent 70%);
    pointer-events: none;
    z-index: 0;
    transform: translate(-50%, -50%);
    will-change: transform;
    transition: opacity 0.3s ease;
    opacity: 0;
  }

  .cursor-glow.active {
    opacity: 1;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 28px;
    padding: 48px 36px 40px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    text-align: center;
    animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    transform-style: preserve-3d;
    transition: transform 0.15s ease-out, box-shadow 0.3s ease;
    will-change: transform;
  }

  @keyframes slideDown {
    from {
      opacity: 0;
      transform: translateY(-24px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .avatar {
    width: 104px;
    height: 104px;
    border-radius: 50%;
    margin: 0 auto 24px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    font-weight: 700;
    color: #fff;
    box-shadow: 0 8px 30px rgba(120, 115, 245, 0.45);
    animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
  }

  /* 头像备用：如果想换成真实照片，把上面 .avatar div 换成
     <img src="你的照片.jpg" class="avatar" style="object-fit:cover;"> */

  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
    animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
  }

  .tagline {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 20px;
    letter-spacing: 0.3px;
    animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
  }

  /* ============== 打字机效果 ============== */
  .bio {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-secondary);
    margin-bottom: 32px;
    min-height: 51px; /* 预留两行高度，防止打字过程中页面跳动 */
  }

  .bio .typed-cursor {
    display: inline-block;
    width: 2px;
    height: 14px;
    background: var(--accent-3);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ============== 社交链接区域 ============== */
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 20px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--card-border);
    color: var(--text-primary);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
    animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) var(--delay) both;
  }

  .link-btn:nth-child(1) { --delay: 0.5s; }
  .link-btn:nth-child(2) { --delay: 0.6s; }
  .link-btn:nth-child(3) { --delay: 0.7s; }

  .link-btn:hover {
    transform: translateY(-2px);
    background: rgba(255, 255, 255, 0.1);
    border-color: var(--accent-2);
  }

  .link-btn .icon {
    font-size: 17px;
  }

  /* 点击波纹效果 */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.5);
    transform: scale(0);
    animation: ripple-effect 0.6s ease-out;
    pointer-events: none;
  }

  @keyframes ripple-effect {
    to {
      transform: scale(3);
      opacity: 0;
    }
  }

  .footer-note {
    margin-top: 32px;
    font-size: 12px;
    color: rgba(184, 181, 209, 0.5);
    animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.8s both;
  }

  /* 尊重用户系统的"减少动态效果"设置：自动关闭所有动画/特效，保护性能弱设备和晕动症用户 */
  @media (prefers-reduced-motion: reduce) {
    body::before, body::after, .card, .avatar, h1, .tagline, .bio, .link-btn, .footer-note {
      animation: none !important;
    }
    .cursor-glow { display: none !important; }
    .card { transform: none !important; transition: none !important; }
  }

  /* 触屏设备没有鼠标，直接隐藏光晕效果，避免无意义的常驻元素 */
  @media (hover: none) {
    .cursor-glow { display: none !important; }
  }

  @media (max-width: 480px) {
    .card { padding: 40px 24px 32px; border-radius: 22px; }
  }
</style>
</head>
<body>

  <!-- 鼠标跟随光晕，纯视觉装饰，不收集任何数据 -->
  <div class="cursor-glow" id="cursorGlow"></div>

  <div class="card" id="card">
    <!-- 头像：默认显示名字首字母，想换照片见上方注释 -->
    <div class="avatar">Y</div>

    <!-- 在这里修改你的名字 -->
    <h1>YuYe</h1>
    <div class="tagline">@DJX644</div>

    <!-- 在这里修改你的简介（会以打字机效果显示） -->
    <p class="bio" id="bioText" data-text="我是雨夜，很高兴认识你。"></p>

    <!-- 在这里修改你的社交链接，href 改成真实网址 -->
    <div class="links">
      <a class="link-btn" href="https://github.com/DJX644" target="_blank">
        <span class="icon">💻</span> GitHub
      </a>
      <a class="link-btn" href="mailto:2178048994@qq.com">
        <span class="icon">📧</span> 邮箱联系
      </a>
      <a class="link-btn" href="https://space.bilibili.com/3537107928746180" target="_blank">
        <span class="icon">📺</span> Bilibili
      </a>
    </div>

    <div class="footer-note">© 2026 YuYe</div>
  </div>

  <script>
    // 检测是否为触屏设备 / 用户是否要求减少动效，满足任一条件则跳过所有 JS 特效初始化
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const isTouchDevice = window.matchMedia('(hover: none)').matches;
    const enableEffects = !prefersReducedMotion && !isTouchDevice;

    // ============== 1. 鼠标跟随光晕 ==============
    if (enableEffects) {
      const glow = document.getElementById('cursorGlow');
      let rafId = null;
      let targetX = window.innerWidth / 2;
      let targetY = window.innerHeight / 2;
      let currentX = targetX;
      let currentY = targetY;

      document.addEventListener('mousemove', (e) => {
        targetX = e.clientX;
        targetY = e.clientY;
        glow.classList.add('active');
        if (!rafId) animateGlow();
      }, { passive: true });

      document.addEventListener('mouseleave', () => {
        glow.classList.remove('active');
      });

      // 用 requestAnimationFrame 做平滑跟随插值，避免每次 mousemove 都直接重绘（节流，降低性能开销）
      function animateGlow() {
        currentX += (targetX - currentX) * 0.12;
        currentY += (targetY - currentY) * 0.12;
        glow.style.transform = `translate(${currentX}px, ${currentY}px) translate(-50%, -50%)`;

        if (Math.abs(targetX - currentX) > 0.5 || Math.abs(targetY - currentY) > 0.5) {
          rafId = requestAnimationFrame(animateGlow);
        } else {
          rafId = null;
        }
      }
    }

    // ============== 2. 卡片轻微 3D 倾斜跟随 ==============
    if (enableEffects) {
      const card = document.getElementById('card');

      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        // 倾斜幅度故意调得很小（最大约2.5度），保持克制，不做成游戏卡片那种夸张效果
        const rotateX = ((y - centerY) / centerY) * -2.5;
        const rotateY = ((x - centerX) / centerX) * 2.5;

        card.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      }, { passive: true });

      card.addEventListener('mouseleave', () => {
        card.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg)';
      });
    }

    // ============== 3. 打字机效果（页面加载时跑一次，不循环、不持续占用资源）==============
    function typeWriter() {
      const el = document.getElementById('bioText');
      const text = el.getAttribute('data-text');
      let i = 0;

      const cursor = document.createElement('span');
      cursor.className = 'typed-cursor';

      function type() {
        if (i < text.length) {
          el.textContent = text.slice(0, i + 1);
          el.appendChild(cursor);
          i++;
          setTimeout(type, 55);
        } else {
          // 打字完成后，光标再闪烁几秒然后移除，避免永久占用一个 CSS 动画
          setTimeout(() => cursor.remove(), 2400);
        }
      }
      type();
    }

    if (prefersReducedMotion) {
      // 减少动效模式下，直接显示完整文字，不跑逐字动画
      document.getElementById('bioText').textContent =
        document.getElementById('bioText').getAttribute('data-text');
    } else {
      typeWriter();
    }

    // ============== 4. 按钮点击波纹效果 ==============
    document.querySelectorAll('.link-btn').forEach(btn => {
      btn.addEventListener('click', function (e) {
        const rect = this.getBoundingClientRect();
        const ripple = document.createElement('span');
        const size = Math.max(rect.width, rect.height);

        ripple.className = 'ripple';
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
        ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';

        this.appendChild(ripple);
        // 动画结束后清理掉这个 DOM 节点，避免按钮里堆积越来越多 ripple 元素
        ripple.addEventListener('animationend', () => ripple.remove());
      });
    });
  </script>

</body>
</html>
